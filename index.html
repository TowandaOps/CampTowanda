<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F7F4EE;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #162416;
    }

    /* ─── TOOLBAR ─────────────────────────────────────────────────────── */
    #toolbar {
      height: 58px;
      min-height: 58px;
      background: #ffffff;
      border-bottom: 1px solid #E3EDE3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.055);
      flex-shrink: 0;
    }

    #brand { display: flex; align-items: center; gap: 12px; }

    #brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 21px;
      font-weight: 400;
      color: #162416;
      letter-spacing: -0.3px;
    }

    #people-badge {
      background: #CBF0D5;
      color: #276147;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 20px;
      letter-spacing: 0.1px;
    }

    #controls { display: flex; gap: 8px; }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #2D6A4F;
      background: #fff;
      border: 1.5px solid #95D4A8;
      border-radius: 7px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      line-height: 1;
      user-select: none;
    }
    .btn:hover  { background: #CBF0D5; border-color: #52B788; }
    .btn:active { background: #B7E4C7; }

    /* ─── CHART CANVAS ────────────────────────────────────────────────── */
    #chart { flex: 1; overflow: hidden; position: relative; }

    #chart svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #chart svg:active { cursor: grabbing; }

    /* ─── BUS CONNECTORS ─────────────────────────────────────────────── */
    .bus {
      fill: none;
      stroke: #A8D5B5;
      stroke-width: 2.5px;
      stroke-linecap: round;
    }

    /* ─── NODE CARDS ──────────────────────────────────────────────────── */
    .node { cursor: pointer; }
    .node.leaf { cursor: default; }

    .node .card {
      fill: #ffffff;
      stroke: #C2E5CE;
      stroke-width: 1.5px;
    }
    .node:hover .card {
      stroke: #40916C;
      filter: url(#glow);
    }

    .role-lbl {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      fill: #162416;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .name-lbl {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      fill: #5A8A68;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    /* Distinction shown in parentheses in black */
    .distinction-lbl {
      fill: #162416;
      font-weight: 400;
    }

    .name-div { stroke: #E3EDE3; stroke-width: 1; }

    .badge-bg { fill: #40916C; }
    .badge-txt {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      fill: #ffffff;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    /* ─── STATUS OVERLAY ──────────────────────────────────────────────── */
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #F7F4EE;
      z-index: 20;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #C2E5CE;
      border-top-color: #40916C;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status .status-msg { color: #5A8A68; font-size: 14px; }
    #status.error { gap: 10px; }
    #status.error .err-icon { font-size: 40px; }
    #status.error .err-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #162416;
    }
    #status.error .err-body {
      color: #5A8A68;
      font-size: 13px;
      text-align: center;
      max-width: 520px;
      line-height: 1.65;
    }
    #status.error code {
      background: #E8E3D8;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11.5px;
      font-family: monospace;
    }

    /* ─── TOOLTIP ─────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: rgba(18, 30, 18, 0.93);
      backdrop-filter: blur(10px);
      color: #ffffff;
      font-size: 12.5px;
      line-height: 1.55;
      padding: 10px 14px;
      border-radius: 9px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 999;
      max-width: 280px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }
    #tooltip.show { opacity: 1; }
    .tt-role   { font-weight: 600; font-size: 13px; }
    .tt-name   { color: #95D4A8; margin-top: 3px; font-size: 12px; }
    .tt-dist   { color: #c8d8c8; font-weight: 400; }
    .tt-hidden {
      color: #74C69D;
      font-size: 11.5px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div id="brand">
    <h1>Org Chart</h1>
    <span id="people-badge">Loading&hellip;</span>
  </div>
  <div id="controls">
    <button class="btn" onclick="expandAll()">Expand All</button>
    <button class="btn" onclick="collapseAll()">Collapse All</button>
    <button class="btn" onclick="resetView()">Reset View</button>
  </div>
</div>

<div id="chart">
  <div id="status">
    <div class="spinner"></div>
    <p class="status-msg">Loading org chart&hellip;</p>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════
const CSV_URL =
  'https://docs.google.com/spreadsheets/d/1J9rEnKjzzHJc6m5PbVRWzNbllHITFWyt-3ZwzRBxslk/gviz/tq?tqx=out:csv';

// ═══════════════════════════════════════════════════════════════════
//  LAYOUT CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const NH_MIN = 76;   // min card height
const NAME_H = 18;   // height per extra name row
const HG     = 20;   // horizontal gap between cards
const VG     = 56;   // vertical gap between card edges
const DUR    = 500;  // animation duration ms

// ═══════════════════════════════════════════════════════════════════
//  CARD GEOMETRY  (dynamic width based on content)
// ═══════════════════════════════════════════════════════════════════

// Estimate rendered card width from text content.
// DM Serif Display 15px ≈ 8.5px/char; DM Sans 13px 600 ≈ 7.2px/char
function cardW(d) {
  if (!d || !d.data) return 140;
  if (d.data.uid === '__ROOT__') return 140;
  const role   = d.data.role || '';
  const people = d.data.people || [];
  let maxPx = role.length * 8.5;
  people.forEach(p => {
    const line = p.distinction ? `${p.name} (${p.distinction})` : (p.name || '');
    maxPx = Math.max(maxPx, line.length * 7.2);
  });
  return Math.max(130, Math.min(300, maxPx + 32));
}

function cardH(d) {
  const n = nodePersonCount(d);
  return n <= 1 ? NH_MIN : NH_MIN + (n - 1) * NAME_H;
}

function cardLayout(d) {
  const people = d.data.people || [];
  const n      = people.length;
  const ch     = cardH(d);

  if (n === 0) return { roleY: 0, divY: null, nameYs: [] };
  if (n === 1) return { roleY: -17, divY: null, nameYs: [16] };

  const roleAreaH = 34;
  const roleY     = -ch / 2 + roleAreaH / 2;
  const divY      = -ch / 2 + roleAreaH;
  const namesTop  = divY + NAME_H / 2 + 2;
  const nameYs    = people.map((_, i) => namesTop + i * NAME_H);
  return { roleY, divY, nameYs };
}

function nodePersonCount(d) {
  return Math.max(1, (d.data.people || []).length);
}

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let svg, g, zoom, root, treeLayout;
let _uid = 0;

// ═══════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════
(async function init() {
  try {
    const raw = await d3.csv(CSV_URL, row => {
      const get = key => {
        const k = Object.keys(row).find(k => k.trim().toLowerCase() === key);
        return k !== undefined ? (row[k] || '').trim() : '';
      };
      return {
        role:        get('role'),
        name:        get('name'),
        distinction: get('distinction'),
        parent:      get('reports to') || null
      };
    });

    const groupMap = new Map();
    raw.filter(r => r.role).forEach(r => {
      const key = `${r.role}\0${r.parent || ''}`;
      if (!groupMap.has(key))
        groupMap.set(key, { role: r.role, parent: r.parent || null, people: [] });
      if (r.name)
        groupMap.get(key).people.push({ name: r.name, distinction: r.distinction || '' });
    });

    // Sort each role's people: distinction first, then first name
    groupMap.forEach(grp =>
      grp.people.sort((a, b) => {
        const dc = (a.distinction || '').localeCompare(b.distinction || '');
        return dc !== 0 ? dc : (a.name || '').localeCompare(b.name || '');
      })
    );

    if (groupMap.size === 0)
      throw new Error('No data found. Check that the sheet has Role / Name / Reports To columns.');

    const uidCounts = new Map();
    const roleToUid = new Map();

    const rows = [...groupMap.values()].map(r => {
      const n   = (uidCounts.get(r.role) || 0) + 1;
      uidCounts.set(r.role, n);
      const uid = n === 1 ? r.role : `${r.role}__${n}`;
      if (n === 1) roleToUid.set(r.role, uid);
      return { ...r, uid };
    });

    rows.forEach(r => {
      r.parentUid = r.parent ? (roleToUid.get(r.parent) || null) : null;
    });

    const roots = rows.filter(r => !r.parentUid);
    if (roots.length === 0)
      throw new Error('No root found. One row must have an empty "Reports To" field.');
    if (roots.length > 1) {
      rows.unshift({ role: '__ROOT__', uid: '__ROOT__', people: [], parent: null, parentUid: null });
      roots.forEach(r => (r.parentUid = '__ROOT__'));
    }

    root = d3.stratify().id(d => d.uid).parentId(d => d.parentUid)(rows);
    root.each(d => { d._uid = ++_uid; });

    root.each(d => {
      if (d.depth >= 2 && d.children) { d._children = d.children; d.children = null; }
    });

    const total = rows
      .filter(r => r.uid !== '__ROOT__')
      .reduce((s, r) => s + nodePersonCount({ data: r }), 0);
    document.getElementById('people-badge').textContent = `${total} people`;

    setupSVG();
    update(root, true);
    setTimeout(fitView, 80);
    document.getElementById('status').style.display = 'none';

  } catch (err) {
    showError(err);
  }
})();

// ═══════════════════════════════════════════════════════════════════
//  SVG SETUP
// ═══════════════════════════════════════════════════════════════════
function setupSVG() {
  svg = d3.select('#chart').append('svg');

  const defs = svg.append('defs');

  const f = defs.append('filter').attr('id', 'shadow')
    .attr('x', '-25%').attr('y', '-25%').attr('width', '150%').attr('height', '150%');
  f.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4)
    .attr('flood-color', 'rgba(0,0,0,0.10)');

  const g2 = defs.append('filter').attr('id', 'glow')
    .attr('x', '-25%').attr('y', '-25%').attr('width', '150%').attr('height', '150%');
  g2.append('feDropShadow').attr('dx', 0).attr('dy', 3).attr('stdDeviation', 6)
    .attr('flood-color', 'rgba(64,145,108,0.25)');

  g = svg.append('g').attr('class', 'root-g');

  zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);

  treeLayout = d3.tree();
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE / RENDER
// ═══════════════════════════════════════════════════════════════════
function update(source, instant) {
  const dur = instant ? 0 : DUR;

  // Compute layout dimensions from actual content
  let maxW = 130, maxCardH = NH_MIN;
  root.each(d => {
    maxW     = Math.max(maxW,     cardW(d));
    maxCardH = Math.max(maxCardH, cardH(d));
  });
  treeLayout.nodeSize([maxW + HG, maxCardH + VG]);
  treeLayout(root);

  const nodes = root.descendants();

  nodes.forEach(d => {
    if (d.x0 === undefined) { d.x0 = source.x0 ?? source.x ?? 0; }
    if (d.y0 === undefined) { d.y0 = source.y0 ?? source.y ?? 0; }
  });

  // ── BUS CONNECTORS (one path per parent, draws stem + rail + drops) ──
  const busNodes = nodes.filter(d => d.children && d.children.length);
  const bus = g.selectAll('path.bus').data(busNodes, d => d._uid);

  // Update existing buses (animate path as nodes shift)
  bus.transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('d', d => buildBusPath(d));

  // Enter new buses: draw at position, fade in
  bus.enter().insert('path', 'g.node')
    .attr('class', 'bus')
    .attr('d', d => buildBusPath(d))
    .style('opacity', 0)
    .transition().duration(dur)
    .style('opacity', 1);

  // Exit: fade out
  bus.exit()
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .style('opacity', 0)
    .remove();

  // ── NODES ──────────────────────────────────────────────────────────
  const node = g.selectAll('g.node').data(nodes, d => d._uid);

  const ne = node.enter().append('g')
    .attr('class', 'node')
    .attr('transform', () =>
      `translate(${source.x0 ?? source.x},${source.y0 ?? source.y})`
    )
    .style('opacity', 0)
    .on('click',     (_, d) => toggle(d))
    .on('mouseover', showTip)
    .on('mousemove', moveTip)
    .on('mouseout',  hideTip);

  ne.append('rect').attr('class', 'card').attr('rx', 10).attr('filter', 'url(#shadow)');

  const nu = node.merge(ne);

  nu.transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('opacity', 1);

  nu.classed('leaf', d => !d.children && !d._children);

  nu.each(function(d) {
    const isVirtual = d.data.uid === '__ROOT__';
    const role   = isVirtual ? 'Organization' : d.data.role;
    const people = isVirtual ? [] : (d.data.people || []);
    const ch     = cardH(d);
    const cw     = cardW(d);
    const layout = cardLayout(d);
    const sel    = d3.select(this);

    sel.select('.card')
      .attr('x', -cw / 2).attr('y', -ch / 2)
      .attr('width', cw).attr('height', ch);

    sel.selectAll('text, line.name-div').remove();

    sel.append('text').attr('class', 'role-lbl')
      .attr('y', layout.roleY)
      .text(clip(role, Math.floor(cw / 8)));

    if (layout.divY !== null) {
      sel.append('line').attr('class', 'name-div')
        .attr('x1', -cw / 2 + 12).attr('x2', cw / 2 - 12)
        .attr('y1', layout.divY).attr('y2', layout.divY);
    }

    layout.nameYs.forEach((y, i) => {
      const person = people[i] || { name: '', distinction: '' };
      const txt = sel.append('text').attr('class', 'name-lbl').attr('y', y);
      txt.append('tspan').text(clip(person.name || '', 32));
      if (person.distinction) {
        txt.append('tspan').attr('class', 'distinction-lbl')
          .text(` (${clip(person.distinction, 24)})`);
      }
    });
  });

  // Collapsed-children badge
  nu.selectAll('.badge').remove();
  nu.filter(d => !!d._children).each(function(d) {
    const n  = totalPersonDesc(d);
    if (!n) return;
    const ch = cardH(d), cw = cardW(d);
    const label = `+${n}`;
    const bw = Math.max(26, label.length * 7 + 12);
    const bh = 17;
    const bg = d3.select(this).append('g').attr('class', 'badge')
      .attr('transform', `translate(${cw / 2 - bw - 4},${ch / 2 - bh - 4})`);
    bg.append('rect').attr('class', 'badge-bg').attr('width', bw).attr('height', bh).attr('rx', 8);
    bg.append('text').attr('class', 'badge-txt').attr('x', bw / 2).attr('y', bh / 2).text(label);
  });

  node.exit()
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('transform', `translate(${source.x},${source.y})`)
    .style('opacity', 0)
    .remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

// ═══════════════════════════════════════════════════════════════════
//  BUS CONNECTOR PATH
//  One SVG path per parent: stem (parent→bus) + rail (leftChild→rightChild)
//  + one vertical drop per child (bus→childTop)
// ═══════════════════════════════════════════════════════════════════
function buildBusPath(d) {
  const ch = d.children;
  if (!ch || !ch.length) return '';

  const pBot = d.y + cardH(d) / 2;
  const busY = pBot + VG * 0.38;          // bus sits ~38% into the gap
  const xs   = ch.map(c => c.x);
  const lx   = Math.min(...xs);
  const rx   = Math.max(...xs);

  let p = `M${d.x},${pBot}V${busY}`;      // stem
  if (lx !== rx) p += ` M${lx},${busY}H${rx}`;  // rail
  ch.forEach(c => { p += ` M${c.x},${busY}V${c.y - cardH(c) / 2}`; }); // drops
  return p;
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function toggle(d) {
  if (d._children) { d.children = d._children; d._children = null; }
  else if (d.children) { d._children = d.children; d.children = null; }
  update(d);
}

function totalPersonDesc(node) {
  const kids = (node.children || []).concat(node._children || []);
  return kids.reduce((s, c) => s + nodePersonCount(c) + totalPersonDesc(c), 0);
}

function clip(str, n) {
  return str && str.length > n ? str.slice(0, n - 1) + '\u2026' : (str || '');
}

// ═══════════════════════════════════════════════════════════════════
//  FIT VIEW
// ═══════════════════════════════════════════════════════════════════
function fitView() {
  if (!root) return;
  let maxW = 130, maxCardH = NH_MIN;
  root.each(d => {
    maxW     = Math.max(maxW,     cardW(d));
    maxCardH = Math.max(maxCardH, cardH(d));
  });
  treeLayout.nodeSize([maxW + HG, maxCardH + VG]);
  treeLayout(root);

  const nodes = root.descendants();
  const x0 = Math.min(...nodes.map(d => d.x - cardW(d) / 2)) - 24;
  const x1 = Math.max(...nodes.map(d => d.x + cardW(d) / 2)) + 24;
  const y0 = Math.min(...nodes.map(d => d.y - cardH(d) / 2)) - 24;
  const y1 = Math.max(...nodes.map(d => d.y + cardH(d) / 2)) + 40;

  const W  = document.getElementById('chart').clientWidth;
  const H  = document.getElementById('chart').clientHeight;
  const sc = Math.min(1, 0.88 * Math.min(W / (x1 - x0), H / (y1 - y0)));

  svg.transition().duration(DUR).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity
      .translate(W / 2 - sc * (x0 + x1) / 2, H / 2 - sc * (y0 + y1) / 2)
      .scale(sc));
}

// ═══════════════════════════════════════════════════════════════════
//  TOOLBAR
// ═══════════════════════════════════════════════════════════════════
function expandAll() {
  if (!root) return;
  root.each(d => { if (d._children) { d.children = d._children; d._children = null; } });
  update(root);
  setTimeout(fitView, DUR + 60);
}

function collapseAll() {
  if (!root) return;
  function deepCollapse(d) {
    const kids = (d.children || []).concat(d._children || []);
    if (kids.length) { d._children = kids; d.children = null; kids.forEach(deepCollapse); }
  }
  const topKids = (root.children || []).concat(root._children || []);
  topKids.forEach(deepCollapse);
  if (root._children) { root.children = root._children; root._children = null; }
  update(root);
}

function resetView() {
  if (!root) return;
  function resetNode(d, depth) {
    const kids = (d.children || []).concat(d._children || []);
    if (depth < 2) { d.children = kids.length ? kids : null; d._children = null; }
    else           { d._children = kids.length ? kids : null; d.children = null; }
    kids.forEach(c => resetNode(c, depth + 1));
  }
  resetNode(root, 0);
  update(root);
  setTimeout(fitView, DUR + 60);
}

// ═══════════════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════════════
const tip = document.getElementById('tooltip');

function showTip(event, d) {
  const isVirtual = d.data.uid === '__ROOT__';
  const role   = isVirtual ? 'Organization' : d.data.role;
  const people = isVirtual ? [] : (d.data.people || []);
  const hidden = d._children ? totalPersonDesc(d) : 0;

  let html = `<div class="tt-role">${esc(role)}</div>`;
  people.forEach(p => {
    const dist = p.distinction
      ? ` <span class="tt-dist">(${esc(p.distinction)})</span>`
      : '';
    html += `<div class="tt-name">${esc(p.name)}${dist}</div>`;
  });
  if (hidden > 0)
    html += `<div class="tt-hidden">+${hidden} hidden report${hidden !== 1 ? 's' : ''}</div>`;

  tip.innerHTML = html;
  tip.classList.add('show');
  moveTip(event);
}

function moveTip(event) {
  let x = event.clientX + 14, y = event.clientY - 14;
  if (x + 300 > window.innerWidth)  x = event.clientX - 314;
  if (y + 120 > window.innerHeight) y = event.clientY - 134;
  tip.style.left = `${x}px`;
  tip.style.top  = `${y}px`;
}

function hideTip() { tip.classList.remove('show'); }

// ═══════════════════════════════════════════════════════════════════
//  ERROR
// ═══════════════════════════════════════════════════════════════════
function showError(err) {
  console.error('[OrgChart]', err);
  const isNetwork = /fetch|network|cors|403|failed to fetch/i.test(err.message || '');
  const s = document.getElementById('status');
  s.className = 'error';
  s.innerHTML = `
    <div class="err-icon">&#x26A0;&#xFE0F;</div>
    <div class="err-title">Couldn't load the org chart</div>
    <p class="err-body">${
      isNetwork
        ? `The Google Sheet isn't accessible.<br>
           Open the sheet, click <strong>Share</strong>, and set access to
           <strong>Anyone with the link &rarr; Viewer</strong>.
           No publishing required &mdash; that's all you need.`
        : esc(err.message)
    }</p>
  `;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
