<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F7F4EE;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #162416;
    }

    /* ─── TOOLBAR ─────────────────────────────────────────────────────── */
    #toolbar {
      height: 58px;
      min-height: 58px;
      background: #ffffff;
      border-bottom: 1px solid #E3EDE3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.055);
      flex-shrink: 0;
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 21px;
      font-weight: 400;
      color: #162416;
      letter-spacing: -0.3px;
    }

    #people-badge {
      background: #CBF0D5;
      color: #276147;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 20px;
      letter-spacing: 0.1px;
    }

    #controls {
      display: flex;
      gap: 8px;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #2D6A4F;
      background: #fff;
      border: 1.5px solid #95D4A8;
      border-radius: 7px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      line-height: 1;
      user-select: none;
    }

    .btn:hover  { background: #CBF0D5; border-color: #52B788; }
    .btn:active { background: #B7E4C7; }

    /* ─── CHART CANVAS ────────────────────────────────────────────────── */
    #chart {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #chart svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #chart svg:active { cursor: grabbing; }

    /* ─── TREE ELEMENTS ───────────────────────────────────────────────── */
    .link {
      fill: none;
      stroke: #A8D5B5;
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .node { cursor: pointer; }
    .node.leaf { cursor: default; }

    .node .card {
      fill: #ffffff;
      stroke: #C2E5CE;
      stroke-width: 1.5px;
    }

    .node:hover .card {
      stroke: #40916C;
      filter: url(#glow);
    }

    .role-lbl {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      fill: #162416;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .name-lbl {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      fill: #5A8A68;
      text-anchor: middle;
      dominant-baseline: hanging;
      pointer-events: none;
    }

    .dist-lbl {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      fill: #000000;
      text-anchor: middle;
      dominant-baseline: hanging;
      pointer-events: none;
    }

    .housing-boy { fill: #2563EB; }
    .housing-girl { fill: #DC2626; }

    .name-div {
      stroke: #E3EDE3;
      stroke-width: 1;
    }

    .badge-bg   { fill: #40916C; }
    .badge-txt  {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      fill: #ffffff;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    /* ─── STATUS OVERLAY ──────────────────────────────────────────────── */
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #F7F4EE;
      z-index: 20;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #C2E5CE;
      border-top-color: #40916C;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status .status-msg { color: #5A8A68; font-size: 14px; }

    #status.error { gap: 10px; }
    #status.error .err-icon { font-size: 40px; }
    #status.error .err-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #162416;
    }
    #status.error .err-body {
      color: #5A8A68;
      font-size: 13px;
      text-align: center;
      max-width: 520px;
      line-height: 1.65;
    }
    #status.error code {
      background: #E8E3D8;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11.5px;
      font-family: monospace;
    }

    /* ─── TOOLTIP ─────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: rgba(18, 30, 18, 0.93);
      backdrop-filter: blur(10px);
      color: #ffffff;
      font-size: 12.5px;
      line-height: 1.55;
      padding: 10px 14px;
      border-radius: 9px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 999;
      max-width: 260px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }
    #tooltip.show { opacity: 1; }
    .tt-role   { font-weight: 600; font-size: 13px; }
    .tt-name   { color: #95D4A8; margin-top: 3px; font-size: 12px; }
    .tt-hidden {
      color: #74C69D;
      font-size: 11.5px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div id="brand">
    <h1>Org Chart</h1>
    <span id="people-badge">Loading&hellip;</span>
  </div>
  <div id="controls">
    <button class="btn" onclick="expandAll()">Expand All</button>
    <button class="btn" onclick="collapseAll()">Collapse All</button>
    <button class="btn" onclick="resetView()">Reset View</button>
  </div>
</div>

<div id="chart">
  <div id="status">
    <div class="spinner"></div>
    <p class="status-msg">Loading org chart&hellip;</p>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════
const CSV_URL =
  'https://docs.google.com/spreadsheets/d/1J9rEnKjzzHJc6m5PbVRWzNbllHITFWyt-3ZwzRBxslk/gviz/tq?tqx=out:csv';

// ═══════════════════════════════════════════════════════════════════
//  LAYOUT CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const MIN_CARD_W = 155;
const NH_MIN  = 76;
const ROLE_H  = 34;
const NAME_H  = 18;
const DIST_H  = 14;
const PERSON_GAP = 8;
const TEXT_PAD_X = 14;
const HG      = 3;
const SUBTREE_GAP = 96;
const LEVEL_GAP = 10;
const BUS_CLEARANCE = 5;
const BUS_MIN_STEM = 7;
const DUR     = 500;

// ═══════════════════════════════════════════════════════════════════
//  CARD GEOMETRY
// ═══════════════════════════════════════════════════════════════════
function cardH(d) {
  const people = nodePeople(d);
  if (people.length === 0) return NH_MIN;

  const peopleH = people.reduce((sum, person, index) => {
    const blockH = NAME_H + (person.distinction ? DIST_H + 4 : 0);
    return sum + blockH + (index > 0 ? PERSON_GAP : 0);
  }, 0);

  return Math.max(NH_MIN, 18 + ROLE_H + peopleH + 16);
}

function cardW(d) {
  const people = nodePeople(d);
  const role = d.data.uid === '__ROOT__' ? 'Organization' : (d.data.role || '');
  const widest = Math.max(
    estimateRoleWidth(role),
    ...people.flatMap(person => [
      estimateNameWidth(person.name || '') + estimateHousingWidth(person.housing),
      person.distinction ? estimateDistWidth(`(${person.distinction})`) : 0,
    ]),
  );
  return Math.max(MIN_CARD_W, widest + TEXT_PAD_X * 2);
}

function cardLayout(d) {
  const ch    = cardH(d);
  const people = nodePeople(d);
  const roleY  = -ch / 2 + 18 + ROLE_H / 2;

  if (people.length === 0) return { roleY, divY: null, people: [] };

  const divY = -ch / 2 + 18 + ROLE_H;
  let cursorY = divY + 12;
  const lines = people.map(person => {
    const blockH = NAME_H + (person.distinction ? DIST_H + 4 : 0);
    const topY = cursorY;
    cursorY += blockH + PERSON_GAP;
    return { person, topY };
  });

  return { roleY, divY, people: lines };
}

function nodePersonCount(d) {
  return Math.max(1, nodePeople(d).length);
}

function nodePeople(d) {
  return d.data.people || [];
}

function estimateRoleWidth(text) {
  return text.length * 9.5;
}

function estimateNameWidth(text) {
  return text.length * 8.1;
}

function estimateDistWidth(text) {
  return text.length * 7.2;
}

function estimateHousingWidth(housing) {
  return housingCode(housing) ? 14 : 0;
}

function firstName(name) {
  return (name || '').trim().split(/\s+/)[0] || '';
}

function comparePeople(a, b) {
  return (a.distinction || '\uffff').localeCompare(b.distinction || '\uffff')
    || firstName(a.name).localeCompare(firstName(b.name))
    || (a.name || '').localeCompare(b.name || '');
}

function housingCode(housing) {
  if (housing === 'Boy') return 'B';
  if (housing === 'Girl') return 'G';
  return '';
}

function housingClass(housing) {
  if (housing === 'Boy') return 'housing-boy';
  if (housing === 'Girl') return 'housing-girl';
  return '';
}

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let svg, g, zoom, root, treeLayout;
let _uid = 0;

// ═══════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════
(async function init() {
  try {
    const raw = await d3.csv(CSV_URL, row => {
      const get = key => {
        const k = Object.keys(row).find(k => k.trim().toLowerCase() === key);
        return k !== undefined ? (row[k] || '').trim() : '';
      };
      return {
        housing: get('housing'),
        role: get('role'),
        name: get('name'),
        parent: get('reports to') || null,
        distinction: get('distinction'),
      };
    });

    const groupMap = new Map();
    raw.filter(r => r.role).forEach(r => {
      const key = `${r.role}\0${r.parent || ''}`;
      if (!groupMap.has(key)) groupMap.set(key, { role: r.role, parent: r.parent || null, people: [] });
      groupMap.get(key).people.push({
        name: r.name || 'OPEN',
        housing: r.housing || '',
        distinction: r.distinction || '',
      });
    });
    groupMap.forEach(grp => grp.people.sort(comparePeople));

    if (groupMap.size === 0)
      throw new Error('No data found. Check that the sheet has Role / Name / Reports To columns.');

    const uidCounts = new Map();
    const roleToUid = new Map();

    const rows = [...groupMap.values()].map(r => {
      const n = (uidCounts.get(r.role) || 0) + 1;
      uidCounts.set(r.role, n);
      const uid = n === 1 ? r.role : `${r.role}__${n}`;
      if (n === 1) roleToUid.set(r.role, uid);
      return { ...r, uid };
    });

    rows.forEach(r => {
      r.parentUid = r.parent ? (roleToUid.get(r.parent) || null) : null;
    });

    const roots = rows.filter(r => !r.parentUid);
    if (roots.length === 0)
      throw new Error('No root found. One row must have an empty "Reports To" field.');
    if (roots.length > 1) {
      rows.unshift({ role: '__ROOT__', uid: '__ROOT__', people: [], parent: null, parentUid: null });
      roots.forEach(r => (r.parentUid = '__ROOT__'));
    }

    root = d3.stratify().id(d => d.uid).parentId(d => d.parentUid)(rows);
    root.each(d => { d._uid = ++_uid; });

    root.each(d => {
      if (d.depth >= 2 && d.children) { d._children = d.children; d.children = null; }
    });

    const total = rows
      .filter(r => r.uid !== '__ROOT__')
      .reduce((s, r) => s + nodePersonCount({ data: r }), 0);
    document.getElementById('people-badge').textContent = `${total} people`;

    setupSVG();
    update(root, true);
    setTimeout(fitView, 80);
    document.getElementById('status').style.display = 'none';

  } catch (err) {
    showError(err);
  }
})();

// ═══════════════════════════════════════════════════════════════════
//  SVG SETUP
// ═══════════════════════════════════════════════════════════════════
function setupSVG() {
  svg = d3.select('#chart').append('svg');

  const defs = svg.append('defs');

  const f = defs.append('filter').attr('id', 'shadow')
    .attr('x', '-25%').attr('y', '-25%').attr('width', '150%').attr('height', '150%');
  f.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4)
    .attr('flood-color', 'rgba(0,0,0,0.10)');

  const g2 = defs.append('filter').attr('id', 'glow')
    .attr('x', '-25%').attr('y', '-25%').attr('width', '150%').attr('height', '150%');
  g2.append('feDropShadow').attr('dx', 0).attr('dy', 3).attr('stdDeviation', 6)
    .attr('flood-color', 'rgba(64,145,108,0.25)');

  g = svg.append('g').attr('class', 'root-g');

  zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);

  treeLayout = d3.tree().nodeSize([MIN_CARD_W + HG, NH_MIN + LEVEL_GAP]);
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE / RENDER
// ═══════════════════════════════════════════════════════════════════
function update(source, instant) {
  const dur = instant ? 0 : DUR;

  let maxCardH = NH_MIN;
  let maxCardW = MIN_CARD_W;
  root.each(d => {
    maxCardH = Math.max(maxCardH, cardH(d));
    maxCardW = Math.max(maxCardW, cardW(d));
  });
  treeLayout.nodeSize([MIN_CARD_W + HG, NH_MIN + LEVEL_GAP]);
  treeLayout(root);
  compactSubtrees(root);
  applyBranchPacking(root);

  const nodes = root.descendants();
  const links = nodes.filter(d => (d.children || []).length > 0);

  nodes.forEach(d => {
    if (d.x0 === undefined) { d.x0 = source.x0 ?? source.x ?? 0; }
    if (d.y0 === undefined) { d.y0 = source.y0 ?? source.y ?? 0; }
  });

  // ── LINKS ──────────────────────────────────────────────────────
  const link = g.selectAll('path.link').data(links, d => d._uid);

  const linkEnter = link.enter().insert('path', 'g')
    .attr('class', 'link')
    .attr('d', () => collapsedBus(source));

  link.merge(linkEnter)
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('d', d => busPath(d));

  link.exit()
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('d', () => collapsedBus(source))
    .remove();

  // ── NODES ──────────────────────────────────────────────────────
  const node = g.selectAll('g.node').data(nodes, d => d._uid);

  const ne = node.enter().append('g')
    .attr('class', 'node')
    .attr('transform', () =>
      `translate(${source.x0 ?? source.x},${source.y0 ?? source.y})`
    )
    .style('opacity', 0)
    .on('click',     (_, d) => toggle(d))
    .on('mouseover', showTip)
    .on('mousemove', moveTip)
    .on('mouseout',  hideTip);

  ne.append('rect').attr('class', 'card').attr('rx', 10).attr('filter', 'url(#shadow)');

  const nu = node.merge(ne);

  nu.transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('opacity', 1);

  nu.classed('leaf', d => !d.children && !d._children);

  nu.each(function(d) {
    const isVirtual = d.data.uid === '__ROOT__';
    const role   = isVirtual ? 'Organization' : d.data.role;
    const people = isVirtual ? [] : nodePeople(d);
    const ch     = cardH(d);
    const cw     = cardW(d);
    const layout = cardLayout(d);
    const sel    = d3.select(this);

    sel.select('.card')
      .attr('x', -cw / 2).attr('y', -ch / 2)
      .attr('width', cw).attr('height', ch);

    sel.selectAll('text, line.name-div, g.person-block').remove();

    sel.append('text').attr('class', 'role-lbl')
      .attr('y', layout.roleY)
      .text(role);

    if (layout.divY !== null) {
      sel.append('line').attr('class', 'name-div')
        .attr('x1', -cw / 2 + 12).attr('x2', cw / 2 - 12)
        .attr('y1', layout.divY).attr('y2', layout.divY);
    }

    layout.people.forEach(({ person, topY }) => {
      const block = sel.append('g').attr('class', 'person-block');
      const name = person.name || 'OPEN';
      const housing = housingCode(person.housing);
      const housingGap = housing ? 4 : 0;
      const nameWidth = estimateNameWidth(name);
      const housingWidth = housing ? estimateHousingWidth(person.housing) - housingGap : 0;
      const totalWidth = nameWidth + housingGap + housingWidth;

      block.append('text')
        .attr('class', 'name-lbl')
        .attr('x', housing ? -(totalWidth / 2) : 0)
        .attr('y', topY)
        .attr('text-anchor', housing ? 'start' : 'middle')
        .text(name);

      if (housing) {
        block.append('text')
          .attr('class', `name-lbl ${housingClass(person.housing)}`)
          .attr('x', -totalWidth / 2 + nameWidth + housingGap)
          .attr('y', topY)
          .attr('text-anchor', 'start')
          .text(housing);
      }

      if (person.distinction) {
        block.append('text')
          .attr('class', 'dist-lbl')
          .attr('x', 0)
          .attr('y', topY + NAME_H + 4)
          .text(`(${person.distinction})`);
      }
    });
  });

  nu.selectAll('.badge').remove();
  nu.filter(d => !!d._children).each(function(d) {
    const n = totalPersonDesc(d);
    if (!n) return;
    const cw    = cardW(d);
    const ch    = cardH(d);
    const label = `+${n}`;
    const bw    = Math.max(26, label.length * 7 + 12);
    const bh    = 17;
    const bg    = d3.select(this).append('g').attr('class', 'badge')
      .attr('transform', `translate(${cw / 2 - bw - 4},${ch / 2 - bh - 4})`);
    bg.append('rect').attr('class', 'badge-bg').attr('width', bw).attr('height', bh).attr('rx', 8);
    bg.append('text').attr('class', 'badge-txt').attr('x', bw / 2).attr('y', bh / 2).text(label);
  });

  node.exit()
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('transform', `translate(${source.x},${source.y})`)
    .style('opacity', 0)
    .remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════

// Bus connector: parent stem → shared horizontal bus → child stems
function busPath(parent) {
  const children = parent.children || [];
  if (children.length === 0) return collapsedBus(parent);

  const sy = parent.y + cardH(parent) / 2;
  if (children.length === 1) {
    const child = children[0];
    const ty = child.y - cardH(child) / 2;
    const my = (sy + ty) / 2;
    return `M${parent.x},${sy} L${parent.x},${my} L${child.x},${my} L${child.x},${ty}`;
  }

  const childTops = children.map(child => child.y - cardH(child) / 2);
  const tyMin = Math.min(...childTops);
  const busY = Math.min(tyMin - BUS_CLEARANCE, sy + Math.max(BUS_MIN_STEM, (tyMin - sy) / 2));
  const xs = children.map(child => child.x).sort((a, b) => a - b);

  let path = `M${parent.x},${sy} L${parent.x},${busY} M${xs[0]},${busY} L${xs[xs.length - 1]},${busY}`;
  children.forEach(child => {
    path += ` M${child.x},${busY} L${child.x},${child.y - cardH(child) / 2}`;
  });
  return path;
}

function collapsedBus(node) {
  const x = node.x0 ?? node.x ?? 0;
  const y = (node.y0 ?? node.y ?? 0) + cardH(node) / 2;
  return `M${x},${y} L${x},${y}`;
}

function toggle(d) {
  if (d._children) { d.children = d._children; d._children = null; }
  else if (d.children) { d._children = d.children; d.children = null; }
  update(d);
}

function totalPersonDesc(node) {
  const kids = (node.children || []).concat(node._children || []);
  return kids.reduce((s, c) => s + nodePersonCount(c) + totalPersonDesc(c), 0);
}

function compactSubtrees(node) {
  const children = node.children || [];
  children.forEach(compactSubtrees);
  if (children.length === 0) return;

  for (let i = 1; i < children.length; i++) {
    const left = subtreeExtent(children[i - 1]);
    const right = subtreeExtent(children[i]);
    const targetMin = left.max + SUBTREE_GAP;
    const shift = targetMin - right.min;
    if (shift !== 0) shiftSubtree(children[i], shift);
  }

  for (let i = 2; i < children.length; i++) {
    const left = subtreeExtent(children[i - 1]);
    const right = subtreeExtent(children[i]);
    const targetMin = left.max + SUBTREE_GAP;
    const shift = targetMin - right.min;
    if (shift > 0) shiftSubtree(children[i], shift);
  }

  node.x = (children[0].x + children[children.length - 1].x) / 2;
}

function subtreeExtent(node) {
  let min = Infinity;
  let max = -Infinity;

  node.each(desc => {
    const half = cardW(desc) / 2;
    min = Math.min(min, desc.x - half);
    max = Math.max(max, desc.x + half);
  });

  return { min, max };
}

function shiftSubtree(node, dx) {
  node.each(desc => { desc.x += dx; });
}

function applyBranchPacking(rootNode) {
  rootNode.y = cardH(rootNode) / 2;
  packBranchChildren(rootNode);
}

function packBranchChildren(parent) {
  const children = parent.children || [];
  if (children.length === 0) return;

  const parentTop = parent.y - cardH(parent) / 2;
  const childTop = parentTop + cardH(parent) + Math.max(LEVEL_GAP, cardH(parent) / 2);

  children.forEach(child => {
    child.y = childTop + cardH(child) / 2;
    packBranchChildren(child);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  FIT VIEW
// ═══════════════════════════════════════════════════════════════════
function fitView() {
  if (!root) return;
  let maxCardH = NH_MIN;
  let maxCardW = MIN_CARD_W;
  root.each(d => {
    maxCardH = Math.max(maxCardH, cardH(d));
    maxCardW = Math.max(maxCardW, cardW(d));
  });
  treeLayout.nodeSize([MIN_CARD_W + HG, NH_MIN + LEVEL_GAP]);
  treeLayout(root);
  compactSubtrees(root);
  applyBranchPacking(root);

  const nodes = root.descendants();
  const x0 = Math.min(...nodes.map(d => d.x - cardW(d) / 2)) - 24;
  const x1 = Math.max(...nodes.map(d => d.x + cardW(d) / 2)) + 24;
  const y0 = Math.min(...nodes.map(d => d.y - cardH(d) / 2)) - 24;
  const y1 = Math.max(...nodes.map(d => d.y + cardH(d) / 2)) + 40;

  const W  = document.getElementById('chart').clientWidth;
  const H  = document.getElementById('chart').clientHeight;
  const sc = Math.min(1, 0.88 * Math.min(W / (x1 - x0), H / (y1 - y0)));

  svg.transition().duration(DUR).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity
      .translate(W / 2 - sc * (x0 + x1) / 2, H / 2 - sc * (y0 + y1) / 2)
      .scale(sc));
}

// ═══════════════════════════════════════════════════════════════════
//  TOOLBAR
// ═══════════════════════════════════════════════════════════════════
function expandAll() {
  if (!root) return;
  root.each(d => { if (d._children) { d.children = d._children; d._children = null; } });
  update(root);
  setTimeout(fitView, DUR + 60);
}

function collapseAll() {
  if (!root) return;
  function deepCollapse(d) {
    const kids = (d.children || []).concat(d._children || []);
    if (kids.length) { d._children = kids; d.children = null; kids.forEach(deepCollapse); }
  }
  const topKids = (root.children || []).concat(root._children || []);
  topKids.forEach(deepCollapse);
  if (root._children) { root.children = root._children; root._children = null; }
  update(root);
}

function resetView() {
  if (!root) return;
  function resetNode(d, depth) {
    const kids = (d.children || []).concat(d._children || []);
    if (depth < 2) { d.children = kids.length ? kids : null; d._children = null; }
    else           { d._children = kids.length ? kids : null; d.children = null; }
    kids.forEach(c => resetNode(c, depth + 1));
  }
  resetNode(root, 0);
  update(root);
  setTimeout(fitView, DUR + 60);
}

// ═══════════════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════════════
const tip = document.getElementById('tooltip');

function showTip(event, d) {
  const isVirtual = d.data.uid === '__ROOT__';
  const role   = isVirtual ? 'Organization' : d.data.role;
  const people = isVirtual ? [] : nodePeople(d);
  const hidden = d._children ? totalPersonDesc(d) : 0;

  let html = `<div class="tt-role">${esc(role)}</div>`;
  if (people.length > 0) {
    html += people.map(person => {
      const detail = person.distinction ? ` (${person.distinction})` : '';
      return `<div class="tt-name">${esc((person.name || '') + detail)}</div>`;
    }).join('');
  }
  if (hidden > 0)
    html += `<div class="tt-hidden">+${hidden} hidden report${hidden !== 1 ? 's' : ''}</div>`;

  tip.innerHTML = html;
  tip.classList.add('show');
  moveTip(event);
}

function moveTip(event) {
  let x = event.clientX + 14, y = event.clientY - 14;
  if (x + 280 > window.innerWidth)  x = event.clientX - 294;
  if (y + 110 > window.innerHeight) y = event.clientY - 124;
  tip.style.left = `${x}px`;
  tip.style.top  = `${y}px`;
}

function hideTip() { tip.classList.remove('show'); }

// ═══════════════════════════════════════════════════════════════════
//  ERROR
// ═══════════════════════════════════════════════════════════════════
function showError(err) {
  console.error('[OrgChart]', err);
  const isNetwork = /fetch|network|cors|403|failed to fetch/i.test(err.message || '');
  const s = document.getElementById('status');
  s.className = 'error';
  s.innerHTML = `
    <div class="err-icon">&#x26A0;&#xFE0F;</div>
    <div class="err-title">Couldn't load the org chart</div>
    <p class="err-body">${
      isNetwork
        ? `The Google Sheet isn't accessible.<br>
           Open the sheet, click <strong>Share</strong>, and set access to
           <strong>Anyone with the link &rarr; Viewer</strong>.
           No publishing required &mdash; that's all you need.`
        : esc(err.message)
    }</p>
  `;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
