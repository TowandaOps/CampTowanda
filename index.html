<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F7F4EE;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #162416;
    }

    /* ─── TOOLBAR ─────────────────────────────────────────────────────── */
    #toolbar {
      height: 58px;
      min-height: 58px;
      background: #ffffff;
      border-bottom: 1px solid #E3EDE3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.055);
      flex-shrink: 0;
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 21px;
      font-weight: 400;
      color: #162416;
      letter-spacing: -0.3px;
    }

    #people-badge {
      background: #CBF0D5;
      color: #276147;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 20px;
      letter-spacing: 0.1px;
    }

    #controls {
      display: flex;
      gap: 8px;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #2D6A4F;
      background: #fff;
      border: 1.5px solid #95D4A8;
      border-radius: 7px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      line-height: 1;
      user-select: none;
    }

    .btn:hover  { background: #CBF0D5; border-color: #52B788; }
    .btn:active { background: #B7E4C7; }

    /* ─── CHART CANVAS ────────────────────────────────────────────────── */
    #chart {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #chart svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #chart svg:active { cursor: grabbing; }

    /* ─── TREE ELEMENTS ───────────────────────────────────────────────── */
    .link {
      fill: none;
      stroke: #A8D5B5;
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .node { cursor: pointer; }
    .node.leaf { cursor: default; }

    .node .card {
      fill: #ffffff;
      stroke: #C2E5CE;
      stroke-width: 1.5px;
    }

    .node:hover .card {
      stroke: #40916C;
      filter: url(#glow);
    }

    .role-lbl {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      fill: #162416;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .name-lbl {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      fill: #5A8A68;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .name-div {
      stroke: #E3EDE3;
      stroke-width: 1;
    }

    .badge-bg   { fill: #40916C; }
    .badge-txt  {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      fill: #ffffff;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    /* ─── STATUS OVERLAY ──────────────────────────────────────────────── */
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #F7F4EE;
      z-index: 20;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #C2E5CE;
      border-top-color: #40916C;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status .status-msg { color: #5A8A68; font-size: 14px; }

    #status.error { gap: 10px; }
    #status.error .err-icon { font-size: 40px; }
    #status.error .err-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #162416;
    }
    #status.error .err-body {
      color: #5A8A68;
      font-size: 13px;
      text-align: center;
      max-width: 520px;
      line-height: 1.65;
    }
    #status.error code {
      background: #E8E3D8;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11.5px;
      font-family: monospace;
    }

    /* ─── TOOLTIP ─────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: rgba(18, 30, 18, 0.93);
      backdrop-filter: blur(10px);
      color: #ffffff;
      font-size: 12.5px;
      line-height: 1.55;
      padding: 10px 14px;
      border-radius: 9px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 999;
      max-width: 260px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }
    #tooltip.show { opacity: 1; }
    .tt-role   { font-weight: 600; font-size: 13px; }
    .tt-name   { color: #95D4A8; margin-top: 3px; font-size: 12px; }
    .tt-hidden {
      color: #74C69D;
      font-size: 11.5px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div id="brand">
    <h1>Org Chart</h1>
    <span id="people-badge">Loading&hellip;</span>
  </div>
  <div id="controls">
    <button class="btn" onclick="expandAll()">Expand All</button>
    <button class="btn" onclick="collapseAll()">Collapse All</button>
    <button class="btn" onclick="resetView()">Reset View</button>
  </div>
</div>

<div id="chart">
  <div id="status">
    <div class="spinner"></div>
    <p class="status-msg">Loading org chart&hellip;</p>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════
const CSV_URL =
  'https://docs.google.com/spreadsheets/d/1J9rEnKjzzHJc6m5PbVRWzNbllHITFWyt-3ZwzRBxslk/gviz/tq?tqx=out:csv';

// ═══════════════════════════════════════════════════════════════════
//  LAYOUT CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const NW      = 155;
const NH_MIN  = 76;
const NAME_H  = 18;
const HG      = 15;
const VG      = 56;
const DUR     = 500;

// ═══════════════════════════════════════════════════════════════════
//  CARD GEOMETRY
// ═══════════════════════════════════════════════════════════════════
function cardH(d) {
  const n = nodePersonCount(d);
  if (n <= 1) return NH_MIN;
  return NH_MIN + (n - 1) * NAME_H;
}

function cardLayout(d) {
  const names = (d.data.names || []);
  const n     = names.length;
  const ch    = cardH(d);

  if (n === 0) return { roleY: 0, divY: null, nameYs: [] };
  if (n === 1) return { roleY: -17, divY: null, nameYs: [16] };

  const roleAreaH = 34;
  const roleY     = -ch / 2 + roleAreaH / 2;
  const divY      = -ch / 2 + roleAreaH;
  const namesTop  = divY + NAME_H / 2 + 2;
  const nameYs    = names.map((_, i) => namesTop + i * NAME_H);
  return { roleY, divY, nameYs };
}

function nodePersonCount(d) {
  return Math.max(1, (d.data.names || []).length);
}

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let svg, g, zoom, root, treeLayout;
let _uid = 0;

// ═══════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════
(async function init() {
  try {
    const raw = await d3.csv(CSV_URL, row => {
      const get = key => {
        const k = Object.keys(row).find(k => k.trim().toLowerCase() === key);
        return k !== undefined ? (row[k] || '').trim() : '';
      };
      return { role: get('role'), name: get('name'), parent: get('reports to') || null };
    });

    const groupMap = new Map();
    raw.filter(r => r.role).forEach(r => {
      const key = `${r.role}\0${r.parent || ''}`;
      if (!groupMap.has(key)) groupMap.set(key, { role: r.role, parent: r.parent || null, names: [] });
      if (r.name) groupMap.get(key).names.push(r.name);
    });
    groupMap.forEach(grp => grp.names.sort((a, b) => a.localeCompare(b)));

    if (groupMap.size === 0)
      throw new Error('No data found. Check that the sheet has Role / Name / Reports To columns.');

    const uidCounts = new Map();
    const roleToUid = new Map();

    const rows = [...groupMap.values()].map(r => {
      const n = (uidCounts.get(r.role) || 0) + 1;
      uidCounts.set(r.role, n);
      const uid = n === 1 ? r.role : `${r.role}__${n}`;
      if (n === 1) roleToUid.set(r.role, uid);
      return { ...r, uid };
    });

    rows.forEach(r => {
      r.parentUid = r.parent ? (roleToUid.get(r.parent) || null) : null;
    });

    const roots = rows.filter(r => !r.parentUid);
    if (roots.length === 0)
      throw new Error('No root found. One row must have an empty "Reports To" field.');
    if (roots.length > 1) {
      rows.unshift({ role: '__ROOT__', uid: '__ROOT__', names: [], parent: null, parentUid: null });
      roots.forEach(r => (r.parentUid = '__ROOT__'));
    }

    root = d3.stratify().id(d => d.uid).parentId(d => d.parentUid)(rows);
    root.each(d => { d._uid = ++_uid; });

    root.each(d => {
      if (d.depth >= 2 && d.children) { d._children = d.children; d.children = null; }
    });

    const total = rows
      .filter(r => r.uid !== '__ROOT__')
      .reduce((s, r) => s + nodePersonCount({ data: r }), 0);
    document.getElementById('people-badge').textContent = `${total} people`;

    setupSVG();
    update(root, true);
    setTimeout(fitView, 80);
    document.getElementById('status').style.display = 'none';

  } catch (err) {
    showError(err);
  }
})();

// ═══════════════════════════════════════════════════════════════════
//  SVG SETUP
// ═══════════════════════════════════════════════════════════════════
function setupSVG() {
  svg = d3.select('#chart').append('svg');

  const defs = svg.append('defs');

  const f = defs.append('filter').attr('id', 'shadow')
    .attr('x', '-25%').attr('y', '-25%').attr('width', '150%').attr('height', '150%');
  f.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4)
    .attr('flood-color', 'rgba(0,0,0,0.10)');

  const g2 = defs.append('filter').attr('id', 'glow')
    .attr('x', '-25%').attr('y', '-25%').attr('width', '150%').attr('height', '150%');
  g2.append('feDropShadow').attr('dx', 0).attr('dy', 3).attr('stdDeviation', 6)
    .attr('flood-color', 'rgba(64,145,108,0.25)');

  g = svg.append('g').attr('class', 'root-g');

  zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);

  treeLayout = d3.tree().nodeSize([NW + HG, NH_MIN + VG]);
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE / RENDER
// ═══════════════════════════════════════════════════════════════════
function update(source, instant) {
  const dur = instant ? 0 : DUR;

  let maxCardH = NH_MIN;
  root.each(d => { maxCardH = Math.max(maxCardH, cardH(d)); });
  treeLayout.nodeSize([NW + HG, maxCardH + VG]);
  treeLayout(root);

  const nodes = root.descendants();
  const links  = root.links();

  nodes.forEach(d => {
    if (d.x0 === undefined) { d.x0 = source.x0 ?? source.x ?? 0; }
    if (d.y0 === undefined) { d.y0 = source.y0 ?? source.y ?? 0; }
  });

  // ── LINKS ──────────────────────────────────────────────────────
  const link = g.selectAll('path.link').data(links, d => d.target._uid);

  const linkEnter = link.enter().insert('path', 'g')
    .attr('class', 'link')
    .attr('d', () => elbow(
      { x: source.x0 ?? source.x, y: source.y0 ?? source.y, _d: source },
      { x: source.x0 ?? source.x, y: source.y0 ?? source.y, _d: source }
    ));

  link.merge(linkEnter)
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('d', d => elbow(
      { x: d.source.x, y: d.source.y, _d: d.source },
      { x: d.target.x, y: d.target.y, _d: d.target }
    ));

  link.exit()
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('d', () => elbow(
      { x: source.x, y: source.y, _d: source },
      { x: source.x, y: source.y, _d: source }
    ))
    .remove();

  // ── NODES ──────────────────────────────────────────────────────
  const node = g.selectAll('g.node').data(nodes, d => d._uid);

  const ne = node.enter().append('g')
    .attr('class', 'node')
    .attr('transform', () =>
      `translate(${source.x0 ?? source.x},${source.y0 ?? source.y})`
    )
    .style('opacity', 0)
    .on('click',     (_, d) => toggle(d))
    .on('mouseover', showTip)
    .on('mousemove', moveTip)
    .on('mouseout',  hideTip);

  ne.append('rect').attr('class', 'card').attr('rx', 10).attr('filter', 'url(#shadow)');

  const nu = node.merge(ne);

  nu.transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('opacity', 1);

  nu.classed('leaf', d => !d.children && !d._children);

  nu.each(function(d) {
    const isVirtual = d.data.uid === '__ROOT__';
    const role   = isVirtual ? 'Organization' : d.data.role;
    const names  = isVirtual ? [] : (d.data.names || []);
    const ch     = cardH(d);
    const layout = cardLayout(d);
    const sel    = d3.select(this);

    sel.select('.card')
      .attr('x', -NW / 2).attr('y', -ch / 2)
      .attr('width', NW).attr('height', ch);

    sel.selectAll('text, line.name-div').remove();

    sel.append('text').attr('class', 'role-lbl')
      .attr('y', layout.roleY)
      .text(clip(role, 18));

    if (layout.divY !== null) {
      sel.append('line').attr('class', 'name-div')
        .attr('x1', -NW / 2 + 12).attr('x2', NW / 2 - 12)
        .attr('y1', layout.divY).attr('y2', layout.divY);
    }

    layout.nameYs.forEach((y, i) => {
      sel.append('text').attr('class', 'name-lbl')
        .attr('y', y)
        .text(clip(names[i] || '', 21));
    });
  });

  nu.selectAll('.badge').remove();
  nu.filter(d => !!d._children).each(function(d) {
    const n = totalPersonDesc(d);
    if (!n) return;
    const ch    = cardH(d);
    const label = `+${n}`;
    const bw    = Math.max(26, label.length * 7 + 12);
    const bh    = 17;
    const bg    = d3.select(this).append('g').attr('class', 'badge')
      .attr('transform', `translate(${NW / 2 - bw - 4},${ch / 2 - bh - 4})`);
    bg.append('rect').attr('class', 'badge-bg').attr('width', bw).attr('height', bh).attr('rx', 8);
    bg.append('text').attr('class', 'badge-txt').attr('x', bw / 2).attr('y', bh / 2).text(label);
  });

  node.exit()
    .transition().duration(dur).ease(d3.easeCubicInOut)
    .attr('transform', `translate(${source.x},${source.y})`)
    .style('opacity', 0)
    .remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════

// Orthogonal elbow connector: down from source → horizontal → down to target
function elbow(s, t) {
  const sy = s.y + cardH(s._d || s) / 2;
  const ty = t.y - cardH(t._d || t) / 2;
  const my = (sy + ty) / 2;
  return `M${s.x},${sy} L${s.x},${my} L${t.x},${my} L${t.x},${ty}`;
}

function toggle(d) {
  if (d._children) { d.children = d._children; d._children = null; }
  else if (d.children) { d._children = d.children; d.children = null; }
  update(d);
}

function totalPersonDesc(node) {
  const kids = (node.children || []).concat(node._children || []);
  return kids.reduce((s, c) => s + nodePersonCount(c) + totalPersonDesc(c), 0);
}

function clip(str, n) {
  return str && str.length > n ? str.slice(0, n - 1) + '\u2026' : (str || '');
}

// ═══════════════════════════════════════════════════════════════════
//  FIT VIEW
// ═══════════════════════════════════════════════════════════════════
function fitView() {
  if (!root) return;
  let maxCardH = NH_MIN;
  root.each(d => { maxCardH = Math.max(maxCardH, cardH(d)); });
  treeLayout.nodeSize([NW + HG, maxCardH + VG]);
  treeLayout(root);

  const nodes = root.descendants();
  const xs = nodes.map(d => d.x), ys = nodes.map(d => d.y);
  const x0 = Math.min(...xs) - NW / 2 - 24;
  const x1 = Math.max(...xs) + NW / 2 + 24;
  const y0 = Math.min(...ys) - maxCardH / 2 - 24;
  const y1 = Math.max(...ys) + maxCardH / 2 + 40;

  const W  = document.getElementById('chart').clientWidth;
  const H  = document.getElementById('chart').clientHeight;
  const sc = Math.min(1, 0.88 * Math.min(W / (x1 - x0), H / (y1 - y0)));

  svg.transition().duration(DUR).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity
      .translate(W / 2 - sc * (x0 + x1) / 2, H / 2 - sc * (y0 + y1) / 2)
      .scale(sc));
}

// ═══════════════════════════════════════════════════════════════════
//  TOOLBAR
// ═══════════════════════════════════════════════════════════════════
function expandAll() {
  if (!root) return;
  root.each(d => { if (d._children) { d.children = d._children; d._children = null; } });
  update(root);
  setTimeout(fitView, DUR + 60);
}

function collapseAll() {
  if (!root) return;
  function deepCollapse(d) {
    const kids = (d.children || []).concat(d._children || []);
    if (kids.length) { d._children = kids; d.children = null; kids.forEach(deepCollapse); }
  }
  const topKids = (root.children || []).concat(root._children || []);
  topKids.forEach(deepCollapse);
  if (root._children) { root.children = root._children; root._children = null; }
  update(root);
}

function resetView() {
  if (!root) return;
  function resetNode(d, depth) {
    const kids = (d.children || []).concat(d._children || []);
    if (depth < 2) { d.children = kids.length ? kids : null; d._children = null; }
    else           { d._children = kids.length ? kids : null; d.children = null; }
    kids.forEach(c => resetNode(c, depth + 1));
  }
  resetNode(root, 0);
  update(root);
  setTimeout(fitView, DUR + 60);
}

// ═══════════════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════════════
const tip = document.getElementById('tooltip');

function showTip(event, d) {
  const isVirtual = d.data.uid === '__ROOT__';
  const role   = isVirtual ? 'Organization' : d.data.role;
  const names  = isVirtual ? [] : (d.data.names || []);
  const hidden = d._children ? totalPersonDesc(d) : 0;

  let html = `<div class="tt-role">${esc(role)}</div>`;
  if (names.length > 0) {
    html += names.map(n => `<div class="tt-name">${esc(n)}</div>`).join('');
  }
  if (hidden > 0)
    html += `<div class="tt-hidden">+${hidden} hidden report${hidden !== 1 ? 's' : ''}</div>`;

  tip.innerHTML = html;
  tip.classList.add('show');
  moveTip(event);
}

function moveTip(event) {
  let x = event.clientX + 14, y = event.clientY - 14;
  if (x + 280 > window.innerWidth)  x = event.clientX - 294;
  if (y + 110 > window.innerHeight) y = event.clientY - 124;
  tip.style.left = `${x}px`;
  tip.style.top  = `${y}px`;
}

function hideTip() { tip.classList.remove('show'); }

// ═══════════════════════════════════════════════════════════════════
//  ERROR
// ═══════════════════════════════════════════════════════════════════
function showError(err) {
  console.error('[OrgChart]', err);
  const isNetwork = /fetch|network|cors|403|failed to fetch/i.test(err.message || '');
  const s = document.getElementById('status');
  s.className = 'error';
  s.innerHTML = `
    <div class="err-icon">&#x26A0;&#xFE0F;</div>
    <div class="err-title">Couldn't load the org chart</div>
    <p class="err-body">${
      isNetwork
        ? `The Google Sheet isn't accessible.<br>
           Open the sheet, click <strong>Share</strong>, and set access to
           <strong>Anyone with the link &rarr; Viewer</strong>.
           No publishing required &mdash; that's all you need.`
        : esc(err.message)
    }</p>
  `;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
